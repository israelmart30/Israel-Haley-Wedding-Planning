<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Vendor Ranking Tool</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--cream:#f7f3ee;--warm:#e8dfd4;--stone:#c4b8a8;--bark:#8b7355;--forest:#3d5a47;--ink:#1c1a18;--blush:#d4927a;--gold:#c9a84c;--paper:#faf8f5}
body{background:var(--cream);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
.header{background:var(--ink);color:var(--cream);padding:16px 20px 14px}
.eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.title{font-size:24px;font-weight:300;line-height:1.15;font-style:italic}
.title strong{font-style:normal;font-weight:500}
.save-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.subtitle{font-size:11px;color:var(--stone)}
.save-ind{font-size:11px;color:var(--gold);opacity:0;transition:opacity .3s}
.save-ind.show{opacity:1}
.tabs-wrap{background:#3a3632;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid #555}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;padding:0 8px;min-width:max-content}
.tab{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#e8e4de;padding:12px 14px;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;white-space:nowrap;-webkit-appearance:none}
.tab.active{color:#fff;border-bottom-color:var(--gold)}
.main{padding:16px}
.vlist{display:flex;flex-direction:column;gap:10px}
.card{background:var(--paper);border:1px solid var(--warm);border-radius:10px;overflow:hidden}
.card.l1{border-left:4px solid var(--gold)}
.card.l2{border-left:4px solid var(--stone)}
.card.l3{border-left:4px solid var(--bark)}
.card.booked{border-left:4px solid var(--forest)!important;background:#f3faf6}
.card.contacted{border-left:4px solid #7aa3c4!important}
.card-head{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer;user-select:none;-webkit-user-select:none}
.rnum{font-size:20px;font-weight:300;color:var(--stone);min-width:22px;text-align:center;flex-shrink:0}
.rnum.g{color:var(--gold)}.rnum.s{color:#aaa}.rnum.b{color:var(--bark)}
.cinfo{flex:1;min-width:0}
.cname{font-size:15px;font-weight:600;color:var(--ink);line-height:1.2}
.curl{font-size:11px;color:var(--stone);margin-top:2px}
.cmeta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.badge{font-size:10px;padding:3px 8px;border-radius:20px;white-space:nowrap;font-weight:600}
.badge.contacted{background:#ddeef7;color:#2e6a96}
.badge.booked{background:#d4ede0;color:var(--forest)}
.pill{font-size:10px;padding:3px 9px;border-radius:20px;background:var(--warm);color:var(--bark);white-space:nowrap}
.pill.rated{background:var(--forest);color:#fff}
.chev{font-size:10px;color:var(--stone);margin-left:2px;transition:transform .2s;display:inline-block}
.card.open .chev{transform:rotate(180deg)}
.cbody{display:none;padding:0 14px 16px;border-top:1px solid var(--warm)}
.card.open .cbody{display:block}
.vbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin:14px 0 12px;padding:13px 16px;border-radius:8px;background:var(--ink);color:#fff;font-size:14px;font-weight:600;text-decoration:none;border:none;cursor:pointer;-webkit-appearance:none}
.slabel{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--bark);margin:14px 0 8px}
.srow{display:flex;gap:8px}
.sbtn{flex:1;padding:11px 8px;border-radius:8px;border:1.5px solid var(--warm);background:transparent;color:var(--stone);font-size:13px;font-weight:600;cursor:pointer;-webkit-appearance:none}
.sbtn.oc{background:#ddeef7;border-color:#7aa3c4;color:#2e6a96}
.sbtn.ob{background:#d4ede0;border-color:var(--forest);color:var(--forest)}
.crits{display:flex;flex-direction:column;gap:10px}
.crit{display:flex;align-items:center;gap:8px}
.crit-n{font-size:12px;color:var(--ink);width:108px;flex-shrink:0}
.stars{display:flex;gap:6px}
.star{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--warm);background:transparent;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--stone);cursor:pointer;-webkit-appearance:none;flex-shrink:0}
.star.on{background:var(--ink);border-color:var(--ink);color:#fff}
.vibes{display:flex;flex-wrap:wrap;gap:6px}
.vibe{font-size:12px;padding:7px 12px;border-radius:20px;border:1px solid var(--warm);color:var(--stone);background:transparent;cursor:pointer;-webkit-appearance:none}
.vibe.pos.on{background:var(--forest);border-color:var(--forest);color:#fff}
.vibe.neg.on{background:var(--blush);border-color:var(--blush);color:#fff}
.notes{width:100%;margin-top:4px;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:13px;color:var(--ink);background:var(--cream);border:1px solid var(--warm);border-radius:8px;padding:10px 12px;resize:vertical;min-height:64px;outline:none;-webkit-appearance:none}
.rnks{margin-top:20px;border-top:1px solid var(--warm);padding-top:16px}
.rtitle{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--bark);margin-bottom:12px}
.rrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--warm)}
.rrow:last-child{border-bottom:none}
.rn{font-size:20px;font-weight:300;min-width:22px;color:var(--stone)}
.rn.n1{color:var(--gold)}.rn.n2{color:#999}.rn.n3{color:var(--bark)}
.rname{flex:1;font-size:13px;color:var(--ink)}
.rbadge{font-size:10px;padding:2px 7px;border-radius:20px;white-space:nowrap;font-weight:600}
.rbadge.contacted{background:#ddeef7;color:#2e6a96}
.rbadge.booked{background:#d4ede0;color:var(--forest)}
.pips{display:flex;gap:3px}
.pip{width:7px;height:7px;border-radius:50%;background:var(--warm)}
.pip.on{background:var(--forest)}
.rscore{font-size:11px;color:var(--stone);min-width:32px;text-align:right}
.empty{font-size:12px;color:var(--stone);font-style:italic;padding:8px 0}
</style>
</head>
<body>
<div class="header">
  <div class="eyebrow">Willows Lodge ┬Ę 60 Guests ┬Ę 2027</div>
  <div class="title">Vendor <strong>Ranking</strong> Tool</div>
  <div class="save-row">
    <div class="subtitle">Rate ┬Ę Vibe ┬Ę Rank</div>
    <div class="save-ind" id="si">Ō£ō Saved</div>
  </div>
</div>
<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
<div class="main">
  <div class="vlist" id="vlist"></div>
  <div class="rnks" id="rnks"></div>
</div>
<script>
var C={
  coordinator:{label:"Coordinator",v:[
    {n:"Clutch Events",u:"https://clutchevents.com"},
    {n:"Elegant Affairs",u:"https://elegantaffairswa.com"},
    {n:"Eventful Moments",u:"https://eventfulmomentsllc.com"},
    {n:"Events by Genevieve",u:"https://eventsbygenevieve.com"},
    {n:"Hallea Events",u:"https://halleaevents.com"},
    {n:"It's All in the Details",u:"https://itsallinthedetailsseattle.com"},
    {n:"Pink Blossom Events",u:"https://pinkblossomevents.com"},
    {n:"Shine Event Design",u:"https://shineeventdesign.com"},
    {n:"Your Perfect Bridesmaid",u:"https://yourperfectbridesmaid.com"}
  ]},
  photography:{label:"Photography",v:[
    {n:"Anchor & Lace",u:"https://anchorandlace.com"},
    {n:"B. Jones Photography",u:"https://bjonesphotos.com"},
    {n:"Carol Harrold",u:"https://carolharroldphotography.com"},
    {n:"Cory Parris",u:"https://coryparris.com"},
    {n:"Jenn Tai & Co",u:"https://jenntai.co"},
    {n:"Jenny GG Photography",u:"https://jennygg.com"},
    {n:"Kristen Honeycutt",u:"https://kristenhoneycutt.com"},
    {n:"Sasha Reiko",u:"https://sashareiko.com"},
    {n:"Sound Originals",u:"https://soundoriginals.com"},
    {n:"Stephanie Cristalli",u:"https://stephaniecristalli.com"}
  ]},
  dj:{label:"DJ / MC",v:[
    {n:"Affairs to Remember",u:"https://djseattle.com"},
    {n:"Bamboo Beats",u:"https://bamboobeats.com"},
    {n:"Bugsie Productions",u:"https://bugsieproductions.com"},
    {n:"Chris Graves Music",u:"https://chrisgravesmusic.com"},
    {n:"LD Techniques",u:"https://ldtechniques.com"},
    {n:"Magnolia Rhapsody",u:"https://magnoliarhapsody.com"},
    {n:"Seattle Parties",u:"https://seattleparties.co"},
    {n:"Silvicious Productions",u:"https://silviciousproductions.com"},
    {n:"waSOUND",u:"https://wasound.com"}
  ]},
  florals:{label:"Florals",v:[
    {n:"Delinger & Radovich",u:"https://delingerandradovich.com"},
    {n:"Fena Flowers",u:"https://fenaflowers.biz"},
    {n:"Flora D'Amore",u:"https://floradamore.com"},
    {n:"Flora Nova",u:"https://floranovadesign.com"},
    {n:"Flora Pacifica",u:"https://florapacifica.co"},
    {n:"From the Ground Up",u:"https://fromthegroundupfloral.com"},
    {n:"Juniper Flowers",u:"https://juniperflowers.com"},
    {n:"Oak & Fig Floral",u:"https://oakandfigfloral.com"},
    {n:"The Petal & the Stem",u:"https://thepetalandthestem.com"}
  ]},
  hair:{label:"Hair & Makeup",v:[
    {n:"Bridal Beauty Agency",u:"https://bridalbeautyagency.com"},
    {n:"OffWhite Beauty",u:"https://anoffwhiteseattle.com"},
    {n:"Pacific Artistry",u:"https://pacificartistry.com"},
    {n:"Salon Maison",u:"https://salonmaison.net"}
  ]},
  dessert:{label:"Dessert",v:[
    {n:"Aha Sugar Co.",u:"https://ahasugarco.com"},
    {n:"Cakes by Creme de la Creme",u:"https://cakesbycremedelacreme.com"},
    {n:"The Cakewalk Shop",u:"https://thecakewalkshop.com"},
    {n:"Hoffman's Fine Cakes",u:"https://hoffmansfinecakes.com"},
    {n:"Honey Crumb Cake Studio",u:"https://honeycrumb.com"},
    {n:"Nutty Squirrel",u:"https://nuttysquirrel.com"},
    {n:"Seatown Sweets",u:"https://seatownsweets.com"},
    {n:"The Sweet Side",u:"https://thesweetsideseattle.com"},
    {n:"Trophy Cupcakes",u:"https://trophycupcakes.com"}
  ]}
};
var CR={
  coordinator:["Responsiveness","Experience","Personality","Price","Reviews"],
  photography:["Portfolio Style","Personality","Price","Reviews","Availability"],
  dj:["Music Range","MC Energy","Price","Reviews","Experience"],
  florals:["Portfolio Style","Creativity","Price","Reviews","Responsiveness"],
  hair:["Portfolio Quality","Personality","Price","Reviews","Experience"],
  dessert:["Taste","Design","Price","Reviews","Responsiveness"]
};
var POS=["Ō£© Dreamy","­¤ī┐ Earthy","­¤Æ½ Editorial","­¤¬Ą PNW rustic","­¤īĖ Romantic","­¤ÆÄ Luxury","­¤Äē Fun","­¤żØ Easy to work with","­¤ōĖ Insta-worthy","­¤Æī Thoughtful"];
var NEG=["­¤ÆĖ Pricey","­¤Éī Slow","­¤śÉ Generic","­¤żö Uncertain","­¤ōŗ Too formal","ŌÜĀ’ĖÅ Mixed reviews"];
var SK='wvr-v5',cat='coordinator',oc=null,st={},timer=null;
Object.keys(C).forEach(function(k){st[k]={};});
try{var sv=localStorage.getItem(SK);if(sv){var p=JSON.parse(sv);Object.keys(C).forEach(function(k){st[k]=p[k]||{};});}}catch(e){}
function vs(c,n){if(!st[c])st[c]={};if(!st[c][n])st[c][n]={scores:{},vibes:[],notes:'',status:null};return st[c][n];}
function sc(c,n){var v=Object.values(vs(c,n).scores);return v.length?v.reduce(function(a,b){return a+b;},0):null;}
function mx(c){return(CR[c]||[]).length*5;}
function rk(c){return C[c].v.map(function(v){return{n:v.n,u:v.u,s:sc(c,v.n)};}).filter(function(v){return v.s!==null;}).sort(function(a,b){return b.s-a.s;});}
function save(){
  clearTimeout(timer);
  timer=setTimeout(function(){
    try{
      localStorage.setItem(SK,JSON.stringify(st));
      var i=document.getElementById('si');
      i.classList.add('show');
      setTimeout(function(){i.classList.remove('show');},1800);
    }catch(e){}
  },600);
}
function render(){rTabs();rList();rRnks();}
function rTabs(){
  document.getElementById('tabs').innerHTML=Object.keys(C).map(function(k){
    return '<button class="tab '+(k===cat?'active':'')+'" onclick="sw(\''+k+'\')">'+C[k].label+'</button>';
  }).join('');
}
function sw(k){cat=k;oc=null;render();}
function e(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function rList(){
  var rn=rk(cat).map(function(v){return v.n;});
  document.getElementById('vlist').innerHTML=C[cat].v.map(function(v){
    var d=vs(cat,v.n),s=sc(cat,v.n),ri=rn.indexOf(v.n),r=ri===-1?null:ri+1,io=oc===cat+v.n;
    var lc=d.status==='booked'?'booked':d.status==='contacted'?'contacted':r===1?'l1':r===2?'l2':r===3?'l3':'';
    var rc=r===1?'g':r===2?'s':r===3?'b':'';
    var cr=(CR[cat]||[]).map(function(c){
      var cur=d.scores[c]||0;
      return '<div class="crit"><div class="crit-n">'+c+'</div><div class="stars">'+
        [1,2,3,4,5].map(function(n){
          return '<button class="star '+(cur>=n?'on':'')+'" onclick="ss(event,\''+cat+'\',\''+e(v.n)+'\',\''+c+'\','+n+')">'+n+'</button>';
        }).join('')+'</div></div>';
    }).join('');
    var pv=POS.map(function(b){return '<button class="vibe pos '+(d.vibes.indexOf(b)!==-1?'on':'')+'" onclick="tv(event,\''+cat+'\',\''+e(v.n)+'\',\''+e(b)+'\')">'+b+'</button>';}).join('');
    var nv=NEG.map(function(b){return '<button class="vibe neg '+(d.vibes.indexOf(b)!==-1?'on':'')+'" onclick="tv(event,\''+cat+'\',\''+e(v.n)+'\',\''+e(b)+'\')">'+b+'</button>';}).join('');
    var sb=d.status?('<span class="badge '+d.status+'">'+(d.status==='booked'?'Ō£ō Booked':'ŌåÆ Contacted')+'</span>'):'';
    return '<div class="card '+lc+' '+(io?'open':'')+'">'+
      '<div class="card-head" onclick="tc(\''+cat+'\',\''+e(v.n)+'\')">'+
        '<div class="rnum '+rc+'">'+(r||'ŌĆō')+'</div>'+
        '<div class="cinfo"><div class="cname">'+v.n+'</div><div class="curl">'+v.u.replace('https://','')+'</div></div>'+
        '<div class="cmeta">'+sb+'<span class="pill '+(s!==null?'rated':'')+'">'+( s!==null?(s+'/'+mx(cat)):'not rated')+'</span><span class="chev">Ō¢Š</span></div>'+
      '</div>'+
      '<div class="cbody">'+
        '<a class="vbtn" href="'+v.u+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">­¤öŚ Visit '+v.n+'</a>'+
        '<div class="slabel">Status</div>'+
        '<div class="srow">'+
          '<button class="sbtn '+(d.status==='contacted'?'oc':'')+'" onclick="sts(event,\''+cat+'\',\''+e(v.n)+'\',\'contacted\')">ŌåÆ Contacted</button>'+
          '<button class="sbtn '+(d.status==='booked'?'ob':'')+'" onclick="sts(event,\''+cat+'\',\''+e(v.n)+'\',\'booked\')">Ō£ō Booked</button>'+
        '</div>'+
        '<div class="slabel">Rate this vendor</div>'+
        '<div class="crits">'+cr+'</div>'+
        '<div class="slabel">Vibe check</div>'+
        '<div class="vibes">'+pv+nv+'</div>'+
        '<div class="slabel">Notes</div>'+
        '<textarea class="notes" placeholder="Price quotes, impressionsŌĆ”" onclick="event.stopPropagation()" onchange="sn(\''+cat+'\',\''+e(v.n)+'\',this.value)">'+d.notes+'</textarea>'+
      '</div>'+
    '</div>';
  }).join('');
}
function rRnks(){
  var r=rk(cat),m=mx(cat),el=document.getElementById('rnks');
  if(!r.length){el.innerHTML='<div class="rtitle">Rankings ┬Ę '+C[cat].label+'</div><div class="empty">Rate vendors above to see your ranking.</div>';return;}
  el.innerHTML='<div class="rtitle">Your Ranking ┬Ę '+C[cat].label+'</div>'+
    r.map(function(v,i){
      var d=vs(cat,v.n);
      var pp=Array.from({length:m},function(_,pi){return '<div class="pip '+(pi<v.s?'on':'')+'"></div>';}).join('');
      var rb=d.status?('<span class="rbadge '+d.status+'">'+(d.status==='booked'?'Ō£ō':'ŌåÆ')+'</span>'):'';
      return '<div class="rrow"><div class="rn '+(i===0?'n1':i===1?'n2':i===2?'n3':'')+'">'+(i+1)+'</div><div class="rname">'+v.n+'</div>'+rb+'<div class="pips">'+pp+'</div><div class="rscore">'+v.s+'/'+m+'</div></div>';
    }).join('');
}
function tc(c,n){oc=oc===c+n?null:c+n;rList();}
function ss(ev,c,n,cr,val){ev.stopPropagation();var d=vs(c,n);d.scores[cr]=d.scores[cr]===val?0:val;rList();rRnks();save();}
function tv(ev,c,n,b){ev.stopPropagation();var d=vs(c,n);var i=d.vibes.indexOf(b);if(i===-1)d.vibes.push(b);else d.vibes.splice(i,1);rList();save();}
function sn(c,n,val){vs(c,n).notes=val;save();}
function sts(ev,c,n,s){ev.stopPropagation();var d=vs(c,n);d.status=d.status===s?null:s;rList();rRnks();save();}
render();
</script>
</body>
</html>
